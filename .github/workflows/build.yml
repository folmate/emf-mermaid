name: Build

# ── configurable ──────────────────────────────────────────────────────────────
# Change the branch name below to target a different branch.
on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual runs from the Actions tab
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          # mirrors buildJdkVersion in gradle.properties
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :core:jar :cli:shadowJar

      - name: Upload core jar
        uses: actions/upload-artifact@v4
        with:
          name: core
          path: core/build/libs/core.jar
          if-no-files-found: error

      - name: Upload CLI fat jar
        uses: actions/upload-artifact@v4
        with:
          name: ecore2mermaid
          path: cli/build/libs/ecore2mermaid-*.jar
          if-no-files-found: error
